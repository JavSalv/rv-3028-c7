version: 1.0.0
description: Driver for RV-3028-C7 Ultra low power RTC module
url: https://github.com/JavSalv/rv-3028-c7
repository: https://github.com/JavSalv/rv-3028-c7
license: MIT
targets:
  - esp32
  - esp32c2
  - esp32c3
  - esp32c5
  - esp32c6
  - esp32c61
  - esp32h2
  - esp32p4
  - esp32s2
  - esp32s3


dependencies:
  idf:
    version: '>=4.1.0'
  esp-idf-lib/i2cdev: '*'
  esp-idf-lib/esp_idf_lib_helpers: '*'
